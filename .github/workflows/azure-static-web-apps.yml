# Deploy the Vite/React portfolio to Azure Static Web Apps (application only).
# Infrastructure is provisioned separately: workflow "Terraform Azure Infrastructure".
# Trigger: manual only (Actions → Deploy to Azure Static Web Apps → Run workflow).
name: Deploy to Azure Static Web Apps

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-swa-deploy
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    environment: production

    env:
      # Injected at build time for Vite (contact form)
      VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
      VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
      VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: ""
          output_location: dist
          app_build_command: npm run build
